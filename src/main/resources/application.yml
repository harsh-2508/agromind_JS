spring:
  application:
    name: agromind-auction

  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/agromind_auction
    username: admin
    password: root123
    driver-class-name: org.postgresql.Driver

  # Hibernate/JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Disable default Spring Security password generation for now
  security:
    user:
      name: admin
      password: admin

  # ... (your existing database and security settings)

gemini:
  api:
    key: ${GEMINI_API_KEY}


